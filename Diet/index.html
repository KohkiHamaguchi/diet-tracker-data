<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Diet Tracker</title>
<style>
  :root{ --bg:#07101a; --card:#0c1824; --border:#13263a; --accent:#4ecca3; --warn:#ffb347; --text:#e4f0f8; --mid:#5a8499; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',ui-monospace,monospace;max-width:680px;margin:0 auto;padding:16px}
  .label{font-size:10px;letter-spacing:3px;color:var(--mid);font-weight:600}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
  .big{font-size:44px;font-weight:800;line-height:1}
  .unit{font-size:14px;color:var(--mid);margin-left:4px}
  .row{display:flex;justify-content:space-between;align-items:flex-end}
  .spark{width:100%;height:160px;display:block;margin-top:12px}
  .legend{display:flex;gap:16px;margin-top:6px;font-size:10px}
  table{width:100%;border-collapse:collapse;margin-top:12px;font-size:12px}
  th{color:var(--mid);font-weight:600;text-align:left;padding:8px 6px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card)}
  td{padding:8px 6px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
  td.num{text-align:right;color:var(--accent)}
  td.food{color:var(--mid)}
  td.food .k{color:var(--mid);font-size:10px;margin-left:4px}
  .empty{color:var(--mid);text-align:center;padding:20px 0;font-size:12px}
  .foot{color:#1e3448;font-size:10px;text-align:center;margin-top:8px}
</style></head>
<body>
  <div class="card">
    <div class="label">DIET TRACKER</div>
    <div class="row" style="margin-top:8px">
      <div><span class="big">78.6</span><span class="unit">kg</span></div>
      <div style="text-align:right"><span class="big" style="color:var(--warn);font-size:30px">9.6</span><span class="unit">kg 残り</span></div>
    </div>
  </div>
  <div class="card">
    <div class="label">体重の推移</div>
    <svg viewBox="0 0 620 160" class="spark" preserveAspectRatio="none">
      <line x1="16" y1="144.0" x2="604" y2="144.0" stroke="#ffb347" stroke-dasharray="5 5" stroke-width="1"/>
      <polyline points="16.0,16.0 212.0,23.0 408.0,26.5 604.0,32.3" fill="none" stroke="#4ecca3" stroke-width="2.5"/>
      <circle cx="16.0" cy="16.0" r="2.5" fill="#4ecca3"/><circle cx="212.0" cy="23.0" r="2.5" fill="#4ecca3"/><circle cx="408.0" cy="26.5" r="2.5" fill="#4ecca3"/><circle cx="604.0" cy="32.3" r="2.5" fill="#4ecca3"/>
    </svg>
    <div class="legend"><span style="color:#4ecca3">— 体重</span><span style="color:#ffb347">- - 目標 69kg</span></div>
  </div>
  <div class="card">
    <div class="label">記録一覧（直近）</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>日付</th><th>体重</th><th>kcal</th><th>歩数</th><th>運動</th><th>食事</th></tr></thead>
      <tbody>
      <tr><td>2026-06-07</td><td class="num">78.6</td><td class="num"></td><td class="num">9,300</td><td>縄跳び</td><td class="food">おにぎり2個<span class="k">380</span></td></tr>
<tr><td>2026-06-05</td><td class="num">79.1</td><td class="num">1820</td><td class="num">8,800</td><td>スクワット・プッシュアップ・ストレッチ</td><td class="food"></td></tr>
<tr><td>2026-06-03</td><td class="num">79.4</td><td class="num">1750</td><td class="num">10,500</td><td>ジョギング</td><td class="food">定食<span class="k">850</span></td></tr>
<tr><td>2026-06-01</td><td class="num">80.0</td><td class="num">1900</td><td class="num">7,200</td><td>スクワット・プランク</td><td class="food">牛丼<span class="k">730</span>, サラダ<span class="k">120</span></td></tr>
      </tbody>
    </table></div>
  </div>
  <div class="foot">自動生成 / 正本は data/diet.json</div>
</body></html>
